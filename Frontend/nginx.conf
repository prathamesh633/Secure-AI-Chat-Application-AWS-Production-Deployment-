server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /health {
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host 159xewx0p4.execute-api.us-east-1.amazonaws.com;
        proxy_pass https://159xewx0p4.execute-api.us-east-1.amazonaws.com/prod/health;
    }

    location /chat {
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host 159xewx0p4.execute-api.us-east-1.amazonaws.com;
        proxy_pass https://159xewx0p4.execute-api.us-east-1.amazonaws.com/prod/chat;
    }
}
