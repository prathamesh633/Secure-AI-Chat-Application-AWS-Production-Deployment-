<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" width="100%" height="100%" style="background-color: #0F172A; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38BDF8" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#FB923C" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#C084FC" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#34D399" />
    </marker>
  </defs>

  <g transform="translate(40, 30)">
    <text x="0" y="25" fill="#F8FAFC" font-size="24" font-weight="700" letter-spacing="0.5">Secure Multi-Tier AI Chat Application</text>
    <text x="0" y="48" fill="#94A3B8" font-size="13" font-weight="400">Enterprise-Grade AWS Cloud Architecture Diagram</text>
  </g>

  <!-- LAYER A: Edge & Identity -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="1120" height="200" rx="8" fill="#1E293B" fill-opacity="0.4" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="4 4" />
    <rect x="0" y="0" width="240" height="28" rx="4" fill="#38BDF8" />
    <text x="10" y="18" fill="#0F172A" font-size="11" font-weight="700">LAYER A: Client, Edge &amp; Identity Layer</text>

    <g transform="translate(30, 60)">
      <rect x="0" y="0" width="140" height="70" rx="6" fill="#1E293B" stroke="#64748B" stroke-width="1.5" />
      <text x="70" y="32" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">User Browser</text>
      <text x="70" y="48" fill="#94A3B8" font-size="11" text-anchor="middle">/ Client</text>
    </g>

    <g transform="translate(210, 60)">
      <rect x="0" y="0" width="130" height="70" rx="6" fill="#1E293B" stroke="#38BDF8" stroke-width="1.5" />
      <text x="65" y="32" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">Amazon Route 53</text>
      <text x="65" y="48" fill="#38BDF8" font-size="10" font-weight="600" text-anchor="middle">DNS Resolution</text>
      <text x="65" y="60" fill="#64748B" font-size="9" text-anchor="middle">app.yourdomain.com</text>
    </g>

    <g transform="translate(380, 60)">
      <rect x="0" y="0" width="140" height="70" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" />
      <text x="70" y="32" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">AWS WAFv2</text>
      <text x="70" y="48" fill="#EF4444" font-size="10" font-weight="600" text-anchor="middle">Global Web ACL</text>
      <text x="70" y="60" fill="#94A3B8" font-size="9" text-anchor="middle">Rate Limiting Rules</text>
    </g>

    <g transform="translate(560, 60)">
      <rect x="0" y="0" width="160" height="70" rx="6" fill="#1E293B" stroke="#38BDF8" stroke-width="1.5" />
      <text x="80" y="32" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">Amazon CloudFront</text>
      <text x="80" y="48" fill="#38BDF8" font-size="10" font-weight="600" text-anchor="middle">Global CDN</text>
      <text x="80" y="60" fill="#94A3B8" font-size="9" text-anchor="middle">HTTPS Delivery</text>
    </g>

    <g transform="translate(760, 60)">
      <rect x="0" y="0" width="140" height="70" rx="6" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" />
      <text x="70" y="32" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">Lambda@Edge</text>
      <text x="70" y="48" fill="#F59E0B" font-size="10" font-weight="600" text-anchor="middle">viewer-request trigger</text>
      <text x="70" y="60" fill="#94A3B8" font-size="9" text-anchor="middle">OIDC Token Validation</text>
    </g>

    <g transform="translate(940, 60)">
      <rect x="0" y="0" width="150" height="70" rx="6" fill="#1E293B" stroke="#C084FC" stroke-width="1.5" />
      <text x="75" y="32" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">Auth0 / Okta IDP</text>
      <text x="75" y="48" fill="#C084FC" font-size="10" font-weight="600" text-anchor="middle">OIDC Auth Provider</text>
      <text x="75" y="60" fill="#94A3B8" font-size="9" text-anchor="middle">JWT Sign/Verification</text>
    </g>
  </g>

  <!-- LAYER B: AWS VPC (192.168.0.0/16) -->
  <g transform="translate(40, 340)">
    <rect x="0" y="0" width="1120" height="680" rx="12" fill="#0F172A" stroke="#E2E8F0" stroke-width="2" />
    <rect x="0" y="0" width="280" height="32" rx="4" fill="#E2E8F0" />
    <text x="12" y="20" fill="#0F172A" font-size="12" font-weight="700">AWS VPC Boundary (192.168.0.0/16)</text>

    <!-- Zone 1: Public Subnets (For NAT Gateways) -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="300" height="600" rx="8" fill="#1E293B" fill-opacity="0.3" stroke="#FB923C" stroke-width="1.5" stroke-dasharray="6 4" />
      <text x="12" y="22" fill="#FB923C" font-size="11" font-weight="700">Public Subnets (192.168.10.0/24, .20.0/24)</text>

      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="260" height="80" rx="6" fill="#1E293B" stroke="#FB923C" stroke-width="1.2" />
        <text x="15" y="28" fill="#F1F5F9" font-size="12" font-weight="600">AWS NAT Gateway</text>
        <text x="15" y="48" fill="#94A3B8" font-size="11">Elastic IP attached</text>
        <text x="15" y="65" fill="#CBD5E1" font-size="10">Handles outbound egress for private pods</text>
      </g>
    </g>

    <!-- Zone 2: Private Subnets (For EKS & Admin) -->
    <g transform="translate(340, 50)">
      <rect x="0" y="0" width="760" height="600" rx="8" fill="#1E293B" fill-opacity="0.3" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="6 4" />
      <text x="12" y="22" fill="#38BDF8" font-size="11" font-weight="700">Private Subnets (192.168.100.0/24, .200.0/24)</text>

      <!-- Private API Endpoint -->
      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="340" height="80" rx="6" fill="#1E293B" stroke="#38BDF8" stroke-width="1.2" />
        <text x="15" y="26" fill="#F1F5F9" font-size="12" font-weight="600">execute-api VPC Interface Endpoint</text>
        <text x="15" y="46" fill="#94A3B8" font-size="11">vpce-xxxxxx (AWS PrivateLink)</text>
        <text x="15" y="62" fill="#38BDF8" font-size="9" font-weight="600">Secured via VPC Endpoint Resource Policy</text>
      </g>

      <!-- SSM Bastion Host (Admin access) -->
      <g transform="translate(380, 50)">
        <rect x="0" y="0" width="360" height="80" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1.2" />
        <text x="15" y="24" fill="#F1F5F9" font-size="12" font-weight="600">AWS SSM Bastion Host (Admin Gateway)</text>
        <text x="15" y="42" fill="#94A3B8" font-size="11">EC2 t3.micro | BastionEKSAccessPolicy</text>
        <text x="15" y="58" fill="#10B981" font-size="10" font-weight="600">No public ingress ports (SSM Tunnel only)</text>
      </g>

      <!-- AWS API Gateway Private Integration -->
      <g transform="translate(20, 160)">
        <rect x="0" y="0" width="340" height="70" rx="6" fill="#1E293B" stroke="#A855F7" stroke-width="1.2" />
        <text x="170" y="28" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">AWS API Gateway (Private REST API)</text>
        <text x="170" y="46" fill="#94A3B8" font-size="10" text-anchor="middle">Resource Policy restricts to VPC Endpoint</text>
        <text x="170" y="58" fill="#A855F7" font-size="9" font-weight="600" text-anchor="middle">Integrates via VPC Link</text>
      </g>

      <!-- EKS cluster and compute -->
      <g transform="translate(20, 260)">
        <rect x="0" y="0" width="720" height="310" rx="8" fill="#0F172A" stroke="#34D399" stroke-width="1.5" />
        <rect x="0" y="0" width="240" height="26" rx="4" fill="#34D399" />
        <text x="10" y="17" fill="#0F172A" font-size="11" font-weight="700">Amazon EKS Cluster (enterprise-eks)</text>

        <!-- Internal Load Balancer -->
        <g transform="translate(20, 50)">
          <rect x="0" y="0" width="180" height="230" rx="6" fill="#1E293B" stroke="#34D399" stroke-width="1.2" />
          <text x="90" y="30" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">AWS Internal NLB</text>
          <text x="90" y="50" fill="#94A3B8" font-size="10" text-anchor="middle">Scheme: Internal</text>
          <text x="90" y="65" fill="#94A3B8" font-size="10" text-anchor="middle">Targets: Frontend Pods</text>
          <path d="M 20 90 L 160 90" stroke="#334155" stroke-width="1" />
          <text x="90" y="120" fill="#34D399" font-size="10" font-weight="600" text-anchor="middle">VPC Link Connection</text>
          <text x="90" y="140" fill="#94A3B8" font-size="9" text-anchor="middle">Exposes Frontend</text>
          <text x="90" y="152" fill="#94A3B8" font-size="9" text-anchor="middle">to Private API Gateway</text>
        </g>

        <!-- Frontend Pods -->
        <g transform="translate(230, 50)">
          <rect x="0" y="0" width="220" height="230" rx="6" fill="#1E293B" stroke="#38BDF8" stroke-width="1.2" />
          <text x="110" y="30" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">Frontend Service Pods</text>
          <text x="110" y="50" fill="#38BDF8" font-size="10" text-anchor="middle">Nginx Web Server</text>
          
          <g transform="translate(20, 80)">
            <rect x="0" y="0" width="180" height="40" rx="4" fill="#0F172A" stroke="#64748B" />
            <circle cx="20" cy="20" r="6" fill="#38BDF8" />
            <text x="40" y="24" fill="#E2E8F0" font-size="10">frontend-pod-a7x9</text>
          </g>
          <g transform="translate(20, 135)">
            <rect x="0" y="0" width="180" height="40" rx="4" fill="#0F172A" stroke="#64748B" />
            <circle cx="20" cy="20" r="6" fill="#38BDF8" />
            <text x="40" y="24" fill="#E2E8F0" font-size="10">frontend-pod-m4k2</text>
          </g>
          <text x="110" y="205" fill="#94A3B8" font-size="9" text-anchor="middle">Serves static assets &amp; client UI</text>
        </g>

        <!-- Backend Pods -->
        <g transform="translate(480, 50)">
          <rect x="0" y="0" width="220" height="230" rx="6" fill="#1E293B" stroke="#FB923C" stroke-width="1.2" />
          <text x="110" y="30" fill="#F1F5F9" font-size="12" font-weight="600" text-anchor="middle">Backend Service Pods</text>
          <text x="110" y="50" fill="#FB923C" font-size="10" text-anchor="middle">Flask AI API Orchestrator</text>

          <g transform="translate(20, 80)">
            <rect x="0" y="0" width="180" height="40" rx="4" fill="#0F172A" stroke="#64748B" />
            <circle cx="20" cy="20" r="6" fill="#FB923C" />
            <text x="40" y="24" fill="#E2E8F0" font-size="10">backend-api-pod-9p21</text>
          </g>
          <g transform="translate(20, 135)">
            <rect x="0" y="0" width="180" height="40" rx="4" fill="#0F172A" stroke="#64748B" />
            <circle cx="20" cy="20" r="6" fill="#FB923C" />
            <text x="40" y="24" fill="#E2E8F0" font-size="10">backend-api-pod-3s12</text>
          </g>
          <text x="110" y="205" fill="#F43F5E" font-size="9" font-weight="600" text-anchor="middle">Only accessible via Frontend Pods</text>
        </g>
      </g>
    </g>
  </g>

  <!-- LAYER D: Downstream Integrations (Third-Party) -->
  <g transform="translate(40, 1050)">
    <rect x="0" y="0" width="1120" height="110" rx="8" fill="#1E293B" fill-opacity="0.4" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4 4" />
    <rect x="0" y="0" width="280" height="28" rx="4" fill="#EC4899" />
    <text x="10" y="18" fill="#0F172A" font-size="11" font-weight="700">LAYER D: Downstream Integrations (Third-Party)</text>

    <g transform="translate(730, 40)">
      <rect x="0" y="0" width="360" height="55" rx="6" fill="#1E293B" stroke="#EC4899" stroke-width="1.5" />
      <text x="180" y="24" fill="#F1F5F9" font-size="13" font-weight="600" text-anchor="middle">Azure OpenAI Service</text>
      <text x="180" y="42" fill="#CBD5E1" font-size="10" text-anchor="middle">LLM Backend Endpoint reached securely via NAT Gateway egress</text>
    </g>
  </g>

  <!-- Admin & Operations Layer (External Management) -->
  <g transform="translate(40, 1180)">
    <rect x="0" y="0" width="600" height="90" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" />
    <rect x="0" y="0" width="240" height="26" rx="4" fill="#10B981" />
    <text x="10" y="17" fill="#0F172A" font-size="11" font-weight="700">Admin Operations &amp; Management</text>

    <g transform="translate(20, 35)">
      <rect x="0" y="0" width="150" height="45" rx="4" fill="#1E293B" stroke="#64748B" />
      <text x="75" y="26" fill="#F1F5F9" font-size="11" font-weight="600" text-anchor="middle">Developer / Admin</text>
    </g>

    <g transform="translate(220, 35)">
      <rect x="0" y="0" width="350" height="45" rx="4" fill="#1E293B" stroke="#10B981" stroke-width="1.2" />
      <text x="175" y="20" fill="#F1F5F9" font-size="11" font-weight="600" text-anchor="middle">AWS Systems Manager (SSM) Session Manager</text>
      <text x="175" y="34" fill="#94A3B8" font-size="9" text-anchor="middle">Encrypted administrative tunnel (No Open Ports)</text>
    </g>

    <path d="M 170 57 L 212 57" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow-green)" />
    <!-- Connector to Bastion Host in private subnet -->
    <path d="M 570 57 L 700 57 L 700 -660 L 720 -660" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-green)" />
    <text x="705" y="-670" fill="#10B981" font-size="10" font-weight="600">Admin Session</text>
  </g>

  <!-- Flow Arrows & Connectors -->
  <!-- 1a. DNS Query -->
  <path d="M 170 195 L 185 195 L 185 160 L 202 160" fill="none" stroke="#38BDF8" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="145" y="150" fill="#38BDF8" font-size="10" font-weight="700">1a. DNS Query</text>

  <!-- 1b. HTTPS Request -->
  <path d="M 100 230 L 100 280 L 640 280 L 640 232" fill="none" stroke="#38BDF8" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="320" y="274" fill="#38BDF8" font-size="11" font-weight="700">1b. HTTPS Request to CloudFront</text>

  <!-- WAF Inspection -->
  <path d="M 520 195 L 560 195" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="2 2" />
  <text x="540" y="190" fill="#EF4444" font-size="9" text-anchor="middle">Inspects</text>

  <!-- Lambda Trigger -->
  <path d="M 720 180 L 752 180" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrow-orange)" />
  <text x="736" y="174" fill="#F59E0B" font-size="9" font-weight="700" text-anchor="middle">2</text>
  
  <!-- OIDC Verification -->
  <path d="M 900 180 L 932 180" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrow-purple)" />
  <text x="916" y="174" fill="#C084FC" font-size="9" text-anchor="middle">OIDC</text>
  
  <!-- Valid Token Return -->
  <path d="M 940 210 L 900 210 L 800 210 L 720 210" fill="none" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrow-green)" />
  <text x="800" y="224" fill="#34D399" font-size="9" text-anchor="middle">Valid</text>

  <!-- CloudFront to Private API Gateway via VPC Endpoint -->
  <path d="M 640 230 L 640 330 L 530 330 L 530 490" fill="none" stroke="#38BDF8" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="645" y="315" fill="#38BDF8" font-size="10" font-weight="700">3. Private Endpoint Tunnel</text>

  <!-- Private API Gateway to VPC Link -->
  <path d="M 530 580 L 530 635 L 700 635 L 700 642" fill="none" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arrow-purple)" />
  <text x="600" y="625" fill="#A855F7" font-size="10" font-weight="700">4. VPC Link Routing</text>

  <!-- NLB Routing to Frontend pods -->
  <path d="M 700 710 L 700 735 L 610 735 L 610 705" fill="none" stroke="#38BDF8" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="655" y="730" fill="#38BDF8" font-size="9" font-weight="700">5. Expose UI</text>

  <!-- Frontend communicating with Backend -->
  <path d="M 790 770 L 810 770" stroke="#FB923C" stroke-width="1.5" marker-end="url(#arrow-orange)" />
  <text x="800" y="760" fill="#FB923C" font-size="10" font-weight="700" text-anchor="middle">6</text>
  <text x="800" y="792" fill="#94A3B8" font-size="9" text-anchor="middle">ClusterIP</text>

  <!-- Backend Egress Flow via NAT Gateway -->
  <path d="M 1040 760 L 1040 980 L 210 980 L 210 922" fill="none" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow-purple)" />
  <text x="600" y="972" fill="#EC4899" font-size="11" font-weight="700">7a. Internet Egress via NAT Gateway</text>

  <!-- NAT Gateway to Azure OpenAI -->
  <path d="M 210 460 L 210 400 L 910 400 L 910 1080 L 1090 1080 L 1090 1102" fill="none" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow-purple)" />
  <text x="600" y="392" fill="#EC4899" font-size="11" font-weight="700">7b. Request to Azure OpenAI Endpoint</text>
</svg>
