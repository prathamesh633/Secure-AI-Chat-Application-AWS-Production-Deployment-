apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: enterprise-eks
  region: us-east-1
  version: "1.30"

vpc:
  clusterEndpoints:
    publicAccess: true    # Enable public access initially for setup and bastion configuration
    privateAccess: true

managedNodeGroups:
  - name: private-workers
    instanceType: t3.medium
    minSize: 2
    maxSize: 3
    desiredCapacity: 2
    privateNetworking: true  # Worker nodes are placed in private subnets with no public IPs
    iam:
      withAddonPolicies:
        awsLoadBalancerController: true
