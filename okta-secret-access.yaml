apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: okta-oidc-secret-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["okta-oidc-secret"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: okta-oidc-secret-reader
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: okta-oidc-secret-reader
subjects:
  - kind: ServiceAccount
    name: aws-load-balancer-controller
    namespace: kube-system
